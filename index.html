<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mekatronika Industriala GMHZ: AR praktika 1</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

   <a-scene embedded arjs>

    <a-marker preset="hiro">


<a-plane
    position="0 1.3 0"
    rotation="-90 0 0"
    width="2.5"
    height="1"
    color="white">
</a-plane>
    <a-text
    value="MOTOR ASINKRONOA"
    color="black"
    align="center"
    position="0 1.3 0"
    rotation="-90 0 0"
    scale="0.8 0.8 0.8">
</a-text>
<a-text
    value="Potentzia: 0,37 kW"
    color="black"
    align="left"
    position="0.1 1.3 -0.25"
    rotation="-90 0 0"
    scale="0.6 0.6 0.6">
</a-text>
<a-text
    value="Abiadura: 1400 rpm"
    color="black"
    align="left"
    position="-0.9 1.3 0"
    rotation="-90 0 0"
    scale="0.6 0.6 0.6">
</a-text>
<a-text
    value="Boltaia: 400 V"
    color="black"
    align="left"
    position="-0.9 1.3 0.25"
    rotation="-90 0 0"
    scale="0.6 0.6 0.6">
</a-text>

</a-marker>

</a-scene>

</body>
</html>
